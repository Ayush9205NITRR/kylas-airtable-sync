name: Test Email Alert

on:
  workflow_dispatch:
    inputs:
      slot:
        description: 'Slot (first_half or full_day). full_day includes the Contact Validation Issues section.'
        required: false
        default: 'full_day'
      demo_only:
        description: 'Send a preview to the recipients below only (not the full team)'
        required: false
        default: 'true'
      recipients:
        description: 'Space-separated preview recipient emails'
        required: false
        default: 'ayush@enout.in vedant@enout.in'

jobs:
  test-email:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send email
        run: |
          ARGS="--slot ${{ github.event.inputs.slot }}"
          if [ "${{ github.event.inputs.demo_only }}" = "true" ]; then
            ARGS="$ARGS --demo ${{ github.event.inputs.recipients }}"
          fi
          python modules/04_email_alert.py $ARGS
        env:
          AIRTABLE_PAT:     ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          SMTP_USER:        ${{ secrets.SMTP_USER }}
          SMTP_PASS:        ${{ secrets.SMTP_PASS }}
