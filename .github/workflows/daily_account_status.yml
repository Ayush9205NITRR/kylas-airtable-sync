name: Daily Account Status → Kylas

# Runs after the 6:30 PM IST sync. Re-computes account health from ALL
# contacts and pushes Account Health (BD) + Last Called AT-Date to every
# company whose value changed (skip-if-same keeps unchanged companies to a
# single read). A full sweep — not a called-since window — because pipeline
# stages change without a new call being logged, and those companies must
# still re-sync.

on:
  schedule:
    # 7:00 PM IST = 13:30 UTC, Mon–Fri (30 min after the 6:30 PM sync)
    - cron: '30 13 * * 1-5'
  workflow_dispatch:
    inputs:
      since_date:
        description: 'Optional: only push companies with last_called >= DATE (YYYY-MM-DD). Leave blank = full sweep (--all).'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — print what would be pushed, no API writes'
        type: boolean
        default: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Push Account Status + Last Called Date to Kylas
        env:
          KYLAS_API_KEY:            ${{ secrets.KYLAS_API_KEY }}
          AIRTABLE_PAT:             ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID:         ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_COMPANY_BASE_ID: ${{ secrets.AIRTABLE_COMPANY_BASE_ID }}
        run: |
          if [ -n "${{ github.event.inputs.since_date }}" ]; then
            FLAGS="--since ${{ github.event.inputs.since_date }}"
          else
            FLAGS="--all"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          echo "Running: push_account_status.py $FLAGS"
          python scripts/push_account_status.py $FLAGS
