name: Assign Companies from Airtable → Kylas

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'owner = reassign owners | fields = push mapped fields | both | inspect = list Kylas field keys'
        required: true
        type: choice
        default: 'owner'
        options:
          - owner
          - fields
          - both
          - inspect
      view_name:
        description: 'Airtable view name to read from (Company List table). Not needed for inspect.'
        required: false
        default: 'BD Assignment'
      dry_run:
        description: 'true = print only, no Kylas updates'
        required: false
        default: 'false'

jobs:
  assign:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run assignment / field push
        run: |
          if [ "$MODE" = "inspect" ]; then
            python scripts/assign_from_airtable.py --inspect
          elif [ "$DRY_RUN" = "true" ]; then
            python scripts/assign_from_airtable.py --view "$VIEW_NAME" --mode "$MODE" --dry-run
          else
            python scripts/assign_from_airtable.py --view "$VIEW_NAME" --mode "$MODE"
          fi
        env:
          MODE:                     ${{ github.event.inputs.mode }}
          VIEW_NAME:                ${{ github.event.inputs.view_name }}
          DRY_RUN:                  ${{ github.event.inputs.dry_run }}
          KYLAS_API_KEY:            ${{ secrets.KYLAS_API_KEY }}
          AIRTABLE_PAT:             ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID:         ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_COMPANY_BASE_ID: ${{ secrets.AIRTABLE_COMPANY_BASE_ID }}
