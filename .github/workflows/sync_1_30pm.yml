name: Sync - 1:30 PM IST

on:
  schedule:
    # 1:30 PM IST = 08:00 UTC, Mon–Fri
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Fetch all records (no time filter)'
        required: false
        default: 'false'
      since_date:
        description: 'Fetch records updated on/after this date (YYYY-MM-DD). Overrides full_sync.'
        required: false
        default: ''
      probe_members:
        description: 'Diagnostic: print the resolved BD member list (Airtable BD Members + team.json merge) and exit. Read-only, no sync/email runs.'
        type: boolean
        required: false
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Probe resolved BD member list
        if: ${{ github.event.inputs.probe_members == 'true' }}
        run: python modules/04_email_alert.py --list-members
        env:
          AIRTABLE_PAT:             ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID:         ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_COMPANY_BASE_ID: ${{ secrets.AIRTABLE_COMPANY_BASE_ID }}

      - name: Sync team from Kylas
        if: ${{ github.event.inputs.probe_members != 'true' }}
        run: python scripts/sync_team.py
        env:
          KYLAS_API_KEY: ${{ secrets.KYLAS_API_KEY }}

      - name: Run sync
        if: ${{ github.event.inputs.probe_members != 'true' }}
        run: |
          ARGS="--slot=first_half"
          if [ -n "${{ github.event.inputs.since_date }}" ]; then
            ARGS="$ARGS --since=${{ github.event.inputs.since_date }}"
          elif [ "${{ github.event.inputs.full_sync }}" = "true" ]; then
            ARGS="$ARGS --full-sync"
          fi
          python run_sync.py $ARGS
        env:
          KYLAS_API_KEY:            ${{ secrets.KYLAS_API_KEY }}
          AIRTABLE_PAT:             ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID:         ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_COMPANY_BASE_ID: ${{ secrets.AIRTABLE_COMPANY_BASE_ID }}
          SMTP_USER:                ${{ secrets.SMTP_USER }}
          SMTP_PASS:                ${{ secrets.SMTP_PASS }}
