name: Cold Call - Setup Airtable Schema (run once)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r cold_call/requirements.txt

      - name: Create the Calls table
        run: python scripts/setup_cold_call_airtable.py
        env:
          AIRTABLE_PAT:               ${{ secrets.AIRTABLE_PAT }}
          COLD_CALL_AIRTABLE_BASE_ID: ${{ secrets.COLD_CALL_AIRTABLE_BASE_ID }}
