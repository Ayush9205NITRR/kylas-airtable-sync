name: Deal Rotting Alert

on:
  workflow_dispatch:
    inputs:
      to:
        description: 'Recipients (space-separated). Blank = team.json deal_rot.recipients'
        required: false
        default: ''
      dry_run:
        description: 'Resolve recipients + owners and print them, but do not send the email'
        required: false
        default: 'false'

jobs:
  deal-rot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run deal rotting alert
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.to }}" ]; then
            ARGS="--to ${{ github.event.inputs.to }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python modules/08_deal_rot.py $ARGS
        env:
          KYLAS_API_KEY:    ${{ secrets.KYLAS_API_KEY }}
          AIRTABLE_PAT:     ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          SMTP_USER:        ${{ secrets.SMTP_USER }}
          SMTP_PASS:        ${{ secrets.SMTP_PASS }}
